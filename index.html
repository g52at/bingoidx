<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">    <style>
        * {
            font-family: "Dela Gothic One", sans-serif;
            background-color: #18233F;
            text-align: center;
            color: white; /* テキストを見やすく */
        }
        .text-outline {
            text-shadow: -1px -1px 0 #FFFFFF, 1px -1px 0 #FFFFFF, -1px 1px 0 #FFFFFF, 1px 1px 0 #FFFFFF;
        }
        #slot_zone {
            font-size: 180px; /* 200pxだと2桁で溢れやすいので少し調整 */
            color: black;
            border-radius: 40px;        
            background-color: #FFC93C;
            font-weight: bold;
            
            /* 文字の輪郭をスッキリさせる（厚すぎると文字が潰れます） */
            text-shadow: 2px 2px 0 #FFFFFF, -2px -2px 0 #FFFFFF, 2px -2px 0 #FFFFFF, -2px 2px 0 #FFFFFF;
            
            margin: 20px auto;
            min-width: 300px; /* 最低幅は確保 */
            width: fit-content; /* 文字数に合わせて幅を自動調整 */
            padding: 20px 40px; /* 左右に余裕を持たせる */
            line-height: 1.2; /* 上下が切れないように調整 */
            
            display: flex; /* 中央配置を確実に */
            align-items: center;
            justify-content: center;
        }
        button {
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            border: none;
            margin: 10px;
        }
        #start_animation { background-color: cornflowerblue; color: white; }
        #bingo_botton { background-color: deeppink; color: white; }
        
        /* ログ部分の設定 */
        #logs { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; }
        .log-item {
            font-size: 40px;
            display: inline-block;
            margin: 5px;
            padding: 10px;
            color: black;
            background-color: #FFC93C;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="text-outline" id="slot_zone">OK!</div>
    <button id="start_animation">スタート</button>
    <button id="bingo_botton">ストップ</button>
    <div id="logs"></div>

<script>
    const audio = new Audio('ドラムロール.mp3');
    const audio2 = new Audio('じゃーん.mp3');
    const bingo_max = 75;
    let refreshRate = 50; // 10msは早すぎるので少し調整
    let timerId = null;
    let bingo_array = [];
    let slot_state = false;

    // ビンゴ配列の初期化（フィッシャー・イェーツのシャッフル）
    function initializeBingo() {
        let arr = [];
        for (let i = 1; i <= bingo_max; i++) arr.push(i);
        for (let i = arr.length - 1; i > 0; i--) {
            let r = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[r]] = [arr[r], arr[i]];
        }
        bingo_array = arr;
    }

    function sayHello() {
        let slot_number = Math.floor(Math.random() * 99) + 1;
        document.getElementById('slot_zone').textContent = slot_number;
        timerId = setTimeout(sayHello, refreshRate);
    }

    function start_slot() {
        if (slot_state || bingo_array.length === 0) return; // 動作中または終了時は何もしない
        slot_state = true;
        audio.loop = true; // ドラムロールをループ
        audio.play();
        sayHello();
    }

function stop_slot() {
        if (!slot_state) return;
        slot_state = false;
        
        clearTimeout(timerId);

        // ドラムロールを止めてリセット
        audio.pause();
        audio.currentTime = 0;

        // 「じゃーん」を再生（リセットしてから再生するのがコツ！）
        audio2.pause();        // 一旦止める（念のため）
        audio2.currentTime = 0; // 再生位置を最初に戻す
        audio2.play().catch(e => console.error("再生に失敗しました:", e));

        bingo_main();
    }

    function bingo_main() {
        if (bingo_array.length === 0) {
            alert("全ての抽選が終了しました！");
            return;
        }

        const resultNumber = bingo_array.shift(); // 配列から1つ取り出す
        document.getElementById('slot_zone').textContent = resultNumber;

        // ログに追加
        const logs = document.getElementById("logs");
        const span = document.createElement("span");
        span.className = "log-item";
        span.textContent = resultNumber;
        logs.appendChild(span);
    }

    // イベントリスナー
    document.getElementById('start_animation').addEventListener('click', start_slot);
    document.getElementById('bingo_botton').addEventListener('click', stop_slot);

    document.addEventListener("keydown", (e) => {
        if (e.key === " " || e.code === "Space") {
            e.preventDefault(); // スペースキーでのスクロール防止
            slot_state ? stop_slot() : start_slot();
        }
    });

    // 初期実行
    window.onload = initializeBingo;
</script>
</body>
</html>
